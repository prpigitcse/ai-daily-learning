<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Logbook</title>
    <!-- Tailwind CSS 4+ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap");

      :root {
        --background: #fafafa;
        --foreground: #18181b;
        --card: #ffffff;
        --card-border: #e4e4e7;
        --muted: #71717a;
        --muted-bg: #f4f4f5;
        --accent: #6d28d9;
        --accent-light: #8b5cf6;
        --accent-bg: #ede9fe;
        --radius: 12px;
        --radius-sm: 8px;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background-color: var(--background);
        color: var(--foreground);
        line-height: 1.6;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      /* Smooth Collapsible */
      .content-hidden {
        display: none;
      }
      .rotate-icon {
        transform: rotate(90deg);
      }

      /* Timeline Thread Logic */
      .timeline-line {
        position: absolute;
        left: 7px;
        top: 24px;
        bottom: 0;
        width: 1px;
        background-color: var(--card-border);
      }

      .entry-dot {
        position: absolute;
        left: 4px;
        top: 10px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-bg);
      }

      /* Hover Transitions from globals.css */
      * {
        transition:
          background-color 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease,
          transform 0.2s ease;
      }

      .entry-item:hover .entry-title {
        color: var(--accent);
      }
    </style>
  </head>
  <body class="antialiased selection:bg-violet-100">
    <!-- Header Section -->
    <header class="max-w-2xl mx-auto pt-24 pb-16 px-6 text-center">
      <!-- Square Logo -->
      <div
        class="w-12 h-12 bg-violet-700 rounded-xl flex items-center justify-center mb-6 mx-auto shadow-lg shadow-violet-200"
      >
        <svg
          class="w-6 h-6 text-white"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
          />
        </svg>
      </div>

      <div
        class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-violet-50 border border-violet-100 mb-6"
      >
        <div class="w-2 h-2 rounded-full bg-violet-600 animate-pulse"></div>
        <span
          class="mono text-[10px] font-bold uppercase tracking-wider text-violet-700"
          >Live Learning Feed</span
        >
      </div>

      <h1 class="text-4xl font-semibold tracking-tight text-zinc-900 mb-3">
        AI <span class="text-violet-700">Logbook</span>
      </h1>
      <p class="text-zinc-500 text-lg font-light leading-relaxed">
        A structured public trail of learning artificial intelligence.
      </p>
    </header>

    <!-- Main Content Area -->
    <main class="max-w-2xl mx-auto pb-24 px-6">
      <div id="log-container" class="space-y-12">
        <!-- JavaScript Injects Content Here -->
      </div>
    </main>

    <!-- Footer -->
    <footer class="max-w-2xl mx-auto px-6 pb-24 text-center">
      <div class="h-px bg-zinc-100 w-full mb-12"></div>
      <div class="flex flex-col gap-4">
        <div
          class="flex items-center justify-center gap-2 text-zinc-400 text-[10px] mono uppercase tracking-widest"
        >
          <span>Built with consistency</span>
          <span class="text-zinc-200">·</span>
          <span class="text-zinc-800 font-bold">AI Logbook</span>
        </div>

        <p class="text-zinc-400 text-xs">
          © 2026 Pradosh. Educational content for personal learning and
          reference.
        </p>

        <div
          class="flex items-center justify-center gap-3 text-[10px] mono uppercase tracking-tighter text-zinc-400"
        >
          <a
            href="#"
            class="hover:text-violet-600 transition-colors underline decoration-zinc-100 underline-offset-4"
            >Privacy Policy</a
          >
          <span class="text-zinc-200">·</span>
          <a
            href="#"
            class="hover:text-violet-600 transition-colors underline decoration-zinc-100 underline-offset-4"
            >Sitemap</a
          >
        </div>
      </div>
    </footer>

    <script>
      const logData = [
        {
          month: "February 2026",
          weeks: [
            {
              weekRange: "Feb 15 — Feb 21",
              days: [
                {
                  date: "Feb 20",
                  title: "Quantization for TinyML",
                  tags: ["Optimization", "Edge"],
                  content:
                    "Exploring how 4-bit integer quantization affects the signal-to-noise ratio in audio classification models. Preliminary results show a negligible 0.5% accuracy drop with 3.8x memory savings.",
                },
                {
                  date: "Feb 18",
                  title: "Attention Visualization Patterns",
                  tags: ["Interpretability"],
                  content:
                    "Implemented a custom heatmap generator for multi-head attention. Noticed that head 7 consistently focuses on syntactic delimiters across varied datasets.",
                },
              ],
            },
            {
              weekRange: "Feb 08 — Feb 14",
              days: [
                {
                  date: "Feb 12",
                  title: "Gradient Clipping Dynamics",
                  tags: ["Training"],
                  content:
                    "Adjusted global norm clipping to 0.5. Stability improved on the 7B parameter run, reducing the occurrence of loss spikes during the mid-training phase.",
                },
              ],
            },
          ],
        },
        {
          month: "January 2026",
          weeks: [
            {
              weekRange: "Jan 25 — Jan 31",
              days: [
                {
                  date: "Jan 28",
                  title: "Sparse Attention Kernels",
                  tags: ["Theory", "CUDA"],
                  content:
                    "Reading into Triton-based implementations of block-sparse attention. The goal is to reduce memory complexity from O(N²) to O(N log N) for long-form document processing.",
                },
              ],
            },
          ],
        },
      ];

      const container = document.getElementById("log-container");

      function createIcon() {
        return `<svg class="w-3.5 h-3.5 text-zinc-400 transition-transform rotate-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="9 5l7 7-7 7"></path></svg>`;
      }

      function render() {
        logData.forEach((month, mIdx) => {
          const monthDiv = document.createElement("div");
          monthDiv.className = "relative";

          // Month Heading
          const monthBtn = document.createElement("button");
          monthBtn.className =
            "flex items-center gap-3 w-full text-left group cursor-pointer mb-8 focus:outline-none";
          monthBtn.onclick = () => toggle(`month-${mIdx}`, `icon-m-${mIdx}`);
          monthBtn.innerHTML = `
                    <div id="icon-m-${mIdx}" class="rotate-icon transition-transform">${createIcon()}</div>
                    <h2 class="text-sm mono font-bold uppercase tracking-[0.2em] text-zinc-400 group-hover:text-violet-600">${month.month}</h2>
                    <div class="h-px bg-zinc-100 flex-grow ml-4"></div>
                `;

          const weekList = document.createElement("div");
          weekList.id = `month-${mIdx}`;
          weekList.className = "space-y-10 pl-2";

          month.weeks.forEach((week, wIdx) => {
            const weekDiv = document.createElement("div");

            const weekBtn = document.createElement("button");
            weekBtn.className =
              "flex items-center gap-3 w-full text-left group mb-6 focus:outline-none";
            weekBtn.onclick = () =>
              toggle(`week-${mIdx}-${wIdx}`, `icon-w-${mIdx}-${wIdx}`);
            weekBtn.innerHTML = `
                        <div id="icon-w-${mIdx}-${wIdx}" class="rotate-icon transition-transform">${createIcon()}</div>
                        <span class="text-xs font-semibold text-zinc-500 group-hover:text-zinc-900">${week.weekRange}</span>
                    `;

            const dayList = document.createElement("div");
            dayList.id = `week-${mIdx}-${wIdx}`;
            dayList.className =
              "space-y-8 pl-1 ml-[7px] border-l border-zinc-200";

            week.days.forEach((day) => {
              const dayEl = document.createElement("div");
              dayEl.className = "relative pl-8 entry-item";
              dayEl.innerHTML = `
                            <div class="entry-dot"></div>
                            <header class="flex items-baseline gap-4 mb-2">
                                <span class="mono text-[10px] font-medium text-violet-600 uppercase tracking-wider opacity-70">${day.date}</span>
                                <h3 class="entry-title text-lg font-medium text-zinc-800 leading-tight">${day.title}</h3>
                            </header>
                            <p class="text-zinc-600 text-[15px] leading-relaxed mb-3">${day.content}</p>
                            <div class="flex gap-3">
                                ${day.tags.map((t) => `<span class="text-[10px] mono text-zinc-400 font-medium tracking-tight">#${t}</span>`).join("")}
                            </div>
                        `;
              dayList.appendChild(dayEl);
            });

            weekDiv.appendChild(weekBtn);
            weekDiv.appendChild(dayList);
            weekList.appendChild(weekDiv);
          });

          monthDiv.appendChild(monthBtn);
          monthDiv.appendChild(weekList);
          container.appendChild(monthDiv);
        });
      }

      function toggle(contentId, iconId) {
        const content = document.getElementById(contentId);
        const icon = document.getElementById(iconId);
        content.classList.toggle("content-hidden");
        icon.classList.toggle("rotate-icon");
      }

      window.onload = render;
    </script>
  </body>
</html>
